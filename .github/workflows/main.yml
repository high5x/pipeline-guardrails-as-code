name: Infrastructure Guardrail Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  iac-security-gate:
    name: Infrastructure-as-Code Policy Validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Local Repository Context
      uses: actions/checkout@v4

    - name: Setup HashiCorp Terraform CLI
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    - name: Setup Open Policy Agent (OPA) CLI Environment
      uses: open-policy-agent/setup-opa@v2
      with:
        version: 'latest'

    - name: Generate Declarative Cloud Plan Matrix
      env:
        AWS_ACCESS_KEY_ID: mock-access-key-id
        AWS_SECRET_ACCESS_KEY: mock-secret-access-key
        AWS_DEFAULT_REGION: us-east-1
      run: |
        cd terraform
        terraform init -backend=false
        terraform plan -refresh=false -out=tfplan.binary
        terraform show -json tfplan.binary > tfplan.json

    - name: Execute OPA Rego Structural Audit
      run: |
        echo "=== STARTING INFRASTRUCTURE POLICY AUDIT ==="
        
        # Evaluate the violations directly to a raw JSON output
        opa eval --data policies/db_encryption_check.rego --input terraform/tfplan.json "data.terraform.security.violations" > result.json
        cat result.json
        
        # Check if any violation messages were generated by looking for text strings inside the output array
        if grep -q "CRITICAL" result.json; then
          echo "❌ CRITICAL FAILURE: Security violations identified by Policy Engine."
          exit 1
        else
          echo "✅ SUCCESS: Infrastructure manifest complies with safety baselines."
          exit 0
        fi