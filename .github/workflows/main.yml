name: Infrastructure Guardrail Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  iac-security-gate:
    name: Infrastructure-as-Code Policy Validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Local Repository Context
      uses: actions/checkout@v4

    - name: Setup Open Policy Agent (OPA) CLI Environment
      uses: open-policy-agent/setup-opa@v2
      with:
        version: 'latest'

    - name: Execute OPA Native Compliance Test Suite
      run: |
        echo "=== EXECUTING OPA NATIVE POLICY VERIFICATION ==="
        # Run opa test against the entire policies folder.
        # It will automatically find your rules and execute the test suite natively.
        opa test ./policies -v